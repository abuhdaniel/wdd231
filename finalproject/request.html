<main>

<h1>Cement Request Form</h1>

<section class="form-section">

    <h2>Submit a Cement Request</h2>

    <p>
        Complete the form below to request cement
        from the inventory management system.
    </p>

    <img
        src="images/cement-silo.webp"
        alt="Cement inventory storage facility"
        width="1200"
        height="600"
        loading="lazy">

    <form action="confirmation.html"
          method="get">

        <label for="fullname">
            Full Name
        </label>

        <input
            type="text"
            id="fullname"
            name="fullname"
            required
            minlength="3">

        <label for="department">
            Department
        </label>

        <input
            type="text"
            id="department"
            name="department"
            required>

        <label for="email">
            Email Address
        </label>

        <input
            type="email"
            id="email"
            name="email"
            required>

        <label for="quantity">
            Quantity Required (Tons)
        </label>

        <input
            type="number"
            id="quantity"
            name="quantity"
            min="1"
            max="100"
            required>

        <label for="grade">
            Cement Grade
        </label>

        <select id="grade"
                name="grade"
                required>

            <option value="">
                Select Grade
            </option>

            <option value="42.5N">
                42.5N
            </option>

            <option value="52.5R">
                52.5R
            </option>

        </select>

        <label for="purpose">
            Purpose of Request
        </label>

        <textarea
            id="purpose"
            name="purpose"
            rows="5"
            required></textarea>

        <button type="submit">
            Submit Request
        </button>

    </form>

</section>
