<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<link rel="stylesheet" href="styles/normalize.css">
<link rel="stylesheet" href="styles/small.css">
<link rel="stylesheet" href="styles/larger.css">

<style>

main {
    padding: 2rem;
}

.info {
    background: #f4f4f4;
    padding: 1rem;
    border-radius: 10px;
}

</style>

<script defer>

const params = new URLSearchParams(window.location.search);

window.addEventListener("DOMContentLoaded", () => {

document.getElementById("results").innerHTML = `
<p><strong>First Name:</strong> ${params.get("fname")}</p>
<p><strong>Last Name:</strong> ${params.get("lname")}</p>
<p><strong>Email:</strong> ${params.get("email")}</p>
<p><strong>Phone:</strong> ${params.get("phone")}</p>
<p><strong>Business:</strong> ${params.get("business")}</p>
<p><strong>Date Submitted:</strong> ${params.get("timestamp")}</p>
`;

});

</script>

</head>

<body>

<header>

<h1>Thank You!</h1>

</header>

<main>

<div class="info" id="results"></div>

</main>

</body>
</html>
