<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Thank You | Port Harcourt Chamber</title>

    <meta
        name="description"
        content="Thank you for joining the Port Harcourt Chamber of Commerce."
    >

    <meta
        name="author"
        content="Abuh Daniel"
    >

    <!-- Favicon -->

    <link
        rel="icon"
        type="image/png"
        href="images/favicon.png"
    >

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="styles/normalize.css"
    >

    <link
        rel="stylesheet"
        href="styles/small.css"
    >

    <link
        rel="stylesheet"
        href="styles/larger.css"
    >

    <!-- JavaScript -->

    <script
        src="scripts/thankyou.js"
        defer
    ></script>

</head>

<body>

<header>

    <div class="header-content">

        <div class="logo">

            <img
                src="images/logo.webp"
                alt="Port Harcourt Chamber Logo"
                width="80"
                height="80"
            >

            <span>Port Harcourt Chamber</span>

        </div>

    </div>

</header>

<main class="thankyou-main">

    <h1>Thank You for Joining!</h1>

    <div
        class="info"
        id="results"
    ></div>

</main>

<footer>

    <p>
        <strong>
            Port Harcourt Chamber of Commerce
        </strong>
    </p>

    <p>
        &copy;
        <span id="year"></span>
        Port Harcourt Chamber
    </p>

</footer>

</body>

</html>
