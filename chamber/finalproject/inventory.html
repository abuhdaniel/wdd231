<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CemTrack | Inventory</title>

    <meta name="description"
        content="View cement deliveries, suppliers, silo allocation, and inventory records.">

    <meta name="author" content="Abuh Daniel">

    <!-- Open Graph -->
    <meta property="og:title" content="CemTrack Inventory">
    <meta property="og:description" content="Track cement inventory and deliveries.">
    <meta property="og:type" content="website">

    <link rel="icon" href="favicon.ico">

    <link rel="stylesheet" href="css/small.css">
    <link rel="stylesheet" href="css/large.css">

    <script type="module" src="js/inventory.js" defer></script>
</head>

<body>

<header>
    <div class="logo">
        <h1>CemTrack</h1>
    </div>

    <button id="menu-btn" aria-label="Open Navigation Menu">
        ☰
    </button>

    <nav id="navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="inventory.html" class="active">Inventory</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="request.html">Request Cement</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="page-header">
        <h2>Cement Inventory Records</h2>

        <p>
            Click any delivery card to view detailed information.
        </p>
    </section>

    <section class="controls">

        <label for="supplierFilter">
            Filter by Supplier:
        </label>

        <select id="supplierFilter">
            <option value="all">All Suppliers</option>
            <option value="Dangote">Dangote</option>
            <option value="Lafarge">Lafarge</option>
        </select>

    </section>

    <section id="inventory-container" class="inventory-grid">

        <!-- Dynamic cards generated by JavaScript -->

    </section>

</main>

<!-- Modal Dialog -->

<dialog id="cementModal">

    <button id="closeModal">
        Close
    </button>

    <div id="modalContent">

    </div>

</dialog>
