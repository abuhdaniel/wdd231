<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD231 Course Home Page">
    <meta name="author" content="Abuh Daniel">

    <title>WDD231 Course Home Page</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css">

    <!-- JavaScript Files -->
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/dates.js" defer></script>
    <script src="scripts/courses.js" defer></script>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo-box">
            <img src="images/logo.svg" alt="Website Logo" width="50" height="50">
            <span>Abuh Daniel</span>
        </div>

        <button id="menu"></button>

        <nav class="navigation">
            <a href="index.html" class="active">Home</a>
            <a href="#">Chamber</a>
            <a href="#">Final</a>
        </nav>
    </header>

    <!-- MAIN -->
    <main>
        <h1>Home</h1>

        <div class="main-grid">

            <!-- ABOUT SECTION -->
            <section class="card">
                <h2>About Me</h2>

                <p>
                    Welcome to my WDD231 Course Home Page.
                    This page demonstrates responsive web design
                    using HTML, CSS, and JavaScript.
                </p>
            </section>

            <!-- PHOTO SECTION -->
            <section class="card">
                <h2>Student Photo</h2>

                <img
                    src="images/student-photo.jpg"
                    alt="Student Photo"
                >
            </section>

            <!-- COURSE SECTION -->
            <section class="card courses-section">

                <h2>Web & Computer Programming Certificate</h2>

                <div class="buttons">
                    <button id="all">All Courses</button>
                    <button id="wdd">WDD Courses</button>
                    <button id="cse">CSE Courses</button>
                </div>

                <div id="courses"></div>

                <p id="credits"></p>

            </section>

        </div>
    </main>

    <!-- FOOTER -->
    <footer>

        <div class="socials">
            <a href="https://github.com" target="_blank">GitHub</a>

            <a href="https://linkedin.com" target="_blank">LinkedIn</a>

            <a href="https://facebook.com" target="_blank">Facebook</a>
        </div>

        <p>
            &copy; <span id="year"></span>
            Abuh Daniel | Nigeria
        </p>

        <p id="lastModified"></p>

    </footer>

</body>
</html>
